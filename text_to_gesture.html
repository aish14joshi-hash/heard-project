<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HearD - Text to Gesture</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Main CSS -->
<link rel="stylesheet" href="/static/css/style.css">

<style>

/* THREE DOT MENU BUTTON */
.menu-btn{
position:absolute;
top:20px;
right:25px;
font-size:28px;
cursor:pointer;
color:#000;
}

/* POPUP MENU */
.menu{
display:none;
position:absolute;
top:60px;
right:25px;
background:#ffffff;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
padding:10px;
width:190px;
z-index:1000;
}

/* MENU LINKS */
.menu a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.menu a:hover{
background:#f0f0f0;
border-radius:6px;
}

body {
text-align: center;
font-family: Arial, sans-serif;
background: #d8c3a5;   /* Iced Coffee Color */
padding: 20px;
}

.input-container {
margin-top: 20px;
}

input {
padding: 12px;
width: 280px;
font-size: 16px;
border-radius: 6px;
border: 1px solid #50c9de;
}

button {
padding: 12px 25px;
font-size: 16px;
cursor: pointer;
background: #01132e;
color: white;
border: none;
border-radius: 6px;
margin-top: 10px;
}

button:hover {
background: #b8c9e4;
}

.video-wrapper {
margin: 30px auto;
max-width: 500px;
}

#gestureVideo {
width: 100%;
border-radius: 10px;
border: 3px solid #09172c;
display: none;
background: rgb(17, 58, 71);
}

</style>
</head>

<body>

<!-- THREE DOT MENU -->
<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div id="menu" class="menu">
<a href="/">Home</a>
<a href="/gesture">Gesture → Text</a>
<a href="/text">Text → Gesture</a>
<a href="/learn">Learn Sign Language</a>
<a href="/emergency">Emergency</a>
</div>

<h2>HearD : Text to Gesture</h2>
<p>Type a word and see its sign language gesture</p>
<p>quick, easy and reliable</p>

<div class="input-container">
<input type="text" id="textInput" placeholder="Example: HELLO, THANK YOU">
<br>
<button onclick="showGesture()">Convert to Gesture</button>
</div>

<div class="video-wrapper">
<video id="gestureVideo" controls loop muted playsinline>
<source id="videoSource" src="" type="video/mp4">
Your browser does not support the video tag.
</video>
</div>

<script>

/* MENU FUNCTION */
function toggleMenu(){
const menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}

function showGesture() {

const text = document.getElementById("textInput").value.trim().toUpperCase();
const video = document.getElementById("gestureVideo");
const source = document.getElementById("videoSource");

const gestures = {
"COLD": "cold.mp4",
"HELLO": "hello.mp4",
"GOODBYE": "goodbye.mp4",
"YES": "yes.mp4",
"NO": "no.mp4",
"STOP": "stop.mp4",
"WAIT": "wait.mp4",
"HELP": "help.mp4",
"EMERGENCY": "emergency.mp4",
"CALL": "call.mp4",
"DANGER": "danger.mp4",
"WATER": "water.mp4",
"FOOD": "food.mp4",
"BATHROOM": "bathroom.mp4",
"SLEEP": "sleep.mp4",
"SIT": "sit.mp4",
"STAND": "stand.mp4",
"PLEASE": "please.mp4",
"THANK YOU": "thankyou.mp4",
"SORRY": "sorry.mp4",
"YOU'RE WELCOME": "youre-welcome.mp4",
"WELCOME": "welcome.mp4",
"RESPECT": "respect.mp4",
"HAPPY": "happy.mp4",
"SAD": "sad.mp4",
"ANGRY": "angry.mp4",
"AFRAID": "afraid.mp4",
"I LOVE YOU": "iloveyou.mp4",
"LOVE": "iloveyou.mp4",

"ZERO": "zero.mp4",
"ONE": "one.mp4",
"TWO": "two.mp4",
"THREE": "three.mp4",
"FOUR": "four.mp4",
"FIVE": "five.mp4",
"SIX": "six.mp4",
"SEVEN": "seven.mp4",
"EIGHT": "eight.mp4",
"NINE": "nine.mp4",
"TEN": "ten.mp4",

"SAFE": "safe.mp4",
"KIND": "kind.mp4",
"ARE YOU ALL RIGHT": "areyouallright.mp4",
"HOW ARE YOU DOING": "howareyoudoing.mp4",
"GOOD NIGHT": "goodnight.mp4",
"SEE YOU LATER": "seeyoulater.mp4",
"I DON'T KNOW": "idontknow.mp4",
"WHAT ARE YOU DOING": "whatareyoudoing.mp4",
"ARE YOU OKAY": "areyouokay.mp4",
"GOOD MORNING": "goodmorning.mp4",
"GOOD AFTERNOON": "goodafternoon.mp4",
"GOOD EVENING": "goodevening.mp4"
};

if (gestures[text]) {
source.src = "/static/videos/" + gestures[text];
video.style.display = "block";
video.load();
video.play();
} else {
alert("Gesture not available. Please check spelling.");
video.style.display = "none";
}

}
</script>

</body>
</html>
