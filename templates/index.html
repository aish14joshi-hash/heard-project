<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HearD</title>

<!-- ✅ FIXED LINE HERE -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* Three dot menu button */
.menu-btn{
position:absolute;
top:20px;
right:25px;
font-size:28px;
cursor:pointer;
color:#fff;
}

/* Popup menu */
.menu{
display:none;
position:absolute;
top:60px;
right:25px;
background:#ffffff;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
padding:10px;
width:180px;
}

/* Menu links */
.menu a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.menu a:hover{
background:#f0f0f0;
border-radius:6px;
}

</style>

</head>

<body class="home-bg">

<!-- THREE DOT MENU -->
<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div id="menu" class="menu">
<a href="/">Home</a>
<a href="/gesture">Gesture → Text</a>
<a href="/text">Text → Gesture</a>
<a href="/learn">Learn Sign Language</a>
<a href="/emergency">Emergency</a>
</div>

<div class="container">

<h1>HearD</h1>
<p class="tagline">Signs that Speak, Connections you Seek.</p>

<div class="buttons">

<a href="/gesture">Gesture → Text</a>
<a href="/text">Text → Gesture</a>
<a href="/learn">Learn Sign Language</a>
<a href="/emergency">Emergency</a>

</div>

</div>

<script>

function toggleMenu(){
const menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}

</script>

</body>
</html>
